  /meetings/feedback/user/{user_id}/:
    get:
      operationId: meetings_feedback_user_list
      description: |-
        GET /api/meetings/feedback/user/{user_id}/
        Returns all public feedbacks where the given user is the reviewee.
        Accessible by any authenticated user (e.g. viewing a profile).
      parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        description: Page number for feedback results.
      - in: query
        name: page_size
        schema:
          type: integer
          default: 20
        description: Number of feedback records per page.
      - in: path
        name: user_id
        schema:
          type: string
        required: true
      tags:
      - meetings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
