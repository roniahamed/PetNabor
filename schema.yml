          description: ''
  /friends/suggestions/:
    get:
      operationId: friends_suggestions_list
      description: |-
        API view to retrieve suggested friends for the current user.
        Suggestions are calculated considering mutual friends and distance.
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
          default: 20
        description: Maximum suggestions to return.
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        description: Page number for paginated results.
      - in: query
        name: page_size
        schema:
          type: integer
          default: 20
