openapi: 3.0.3
info:
  title: PetNabor API
  version: 1.0.0
  description: Interactive API documentation for the PetNabor application.
paths:
  /blog/blog-comments/{id}/:
    patch:
      operationId: blog_blog_comments_partial_update
      description: Edit comment text.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - blog
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: blog_blog_comments_destroy
      description: Soft delete a comment.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - blog
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /blog/blogs/:
    get:
      operationId: blog_blogs_list
      description: |-
        List all published blogs. Uses Redis caching for performance.
        Skip caching if there are active search/filter query params.
      parameters:
      - in: query
        name: author_id
        schema:
          type: string
          format: uuid
        description: Filter blogs by author ID.
      - in: query
        name: category
        schema:
          type: string
        description: Filter blogs by category slug.
      - in: query
        name: cursor
        schema:
          type: string
        description: Cursor token for loading the next page.
      - in: query
        name: ordering
        schema:
          type: string
          enum:
          - -created_at
          - -likes_count
          - -views_count
          - created_at
          - likes_count
          - views_count
        description: Sort blogs by created date, views, or likes.
      - in: query
        name: page_size
        schema:
          type: integer
          default: 10
        description: Number of blogs per page.
      - in: query
        name: search
        schema:
          type: string
        description: Full-text search in blog title, body, and tags.
      tags:
      - blog
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBlogListList'
          description: ''
    post:
      operationId: blog_blogs_create
      description: |-
        CRUD for Blogs.
        Uses Cursor Pagination, Full Text Search, and robust Pre-fetching.
      tags:
      - blog
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogDetailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BlogDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BlogDetailRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogDetail'
          description: ''
  /blog/blogs/{slug}/:
    get:
      operationId: blog_blogs_retrieve
      description: Retrieve blog details and track views asyncly.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - blog
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogDetail'
          description: ''
    put:
      operationId: blog_blogs_update
      description: |-
        CRUD for Blogs.
        Uses Cursor Pagination, Full Text Search, and robust Pre-fetching.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - blog
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogDetailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BlogDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BlogDetailRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogDetail'
          description: ''
    patch:
      operationId: blog_blogs_partial_update
      description: |-
        CRUD for Blogs.
        Uses Cursor Pagination, Full Text Search, and robust Pre-fetching.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - blog
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBlogDetailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBlogDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBlogDetailRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogDetail'
          description: ''
    delete:
      operationId: blog_blogs_destroy
      description: |-
        CRUD for Blogs.
        Uses Cursor Pagination, Full Text Search, and robust Pre-fetching.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - blog
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /blog/blogs/{slug}/comments/:
    get:
      operationId: blog_blogs_comments_list
      description: |-
        GET: List top-level comments for the blog with cursor pagination.
        POST: Create a comment/reply.
      parameters:
      - in: query
        name: cursor
        schema:
          type: string
        description: Cursor token for loading the next page of comments.
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: page_size
        schema:
          type: integer
          default: 20
        description: Number of comments per page.
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - blog
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBlogCommentList'
          description: ''
    post:
      operationId: blog_blogs_comments_create
      description: |-
        GET: List top-level comments for the blog with cursor pagination.
        POST: Create a comment/reply.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - blog
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogCommentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BlogCommentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BlogCommentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogComment'
          description: ''
  /blog/blogs/{slug}/like/:
