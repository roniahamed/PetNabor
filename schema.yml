          type: integer
      required:
      - is_liked
      - likes_count
    BlogList:
      type: object
      description: Optimized serializer for list views.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 280
          pattern: ^[-a-zA-Z0-9_]+$
        cover_image:
          type: string
          format: uri
          nullable: true
        author:
          allOf:
          - $ref: '#/components/schemas/AuthorBasic'
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/BlogCategory'
          readOnly: true
        is_published:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
        views_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        likes_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        comments_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
