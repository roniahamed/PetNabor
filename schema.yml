  /friends/search/:
    get:
      operationId: friends_search_list
      parameters:
      - in: query
        name: city
        schema:
          type: string
        description: City-based filter.
      - in: query
        name: include_friends
        schema:
          type: boolean
          default: false
        description: Include already-friended users.
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        description: Page number for paginated results.
      - in: query
        name: page_size
        schema:
          type: integer
          default: 20
        description: Number of results per page.
      - in: query
        name: q
        schema:
          type: string
        description: Search keyword for nearby users.
      - in: query
        name: radius
        schema:
          type: integer
          default: 25
        description: Distance radius in miles.
      - in: query
        name: state
        schema:
          type: string
        description: State or region filter.
      - in: query
        name: type
        schema:
          type: string
          enum:
          - patnabor
          - patpal
        description: User type filter.
      tags:
      - friends
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
