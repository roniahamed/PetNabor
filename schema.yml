          type: string
          format: binary
          nullable: true
        category_id:
          type: string
          format: uuid
          writeOnly: true
        meta_title:
          type: string
          nullable: true
          maxLength: 100
        meta_description:
          type: string
          nullable: true
          maxLength: 255
        tags:
          description: List of string tags for simple searching
        is_published:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
      required:
      - content_body
