components:
  schemas:
    AuthorBasic:
      type: object
      description: Lightweight user embedding — avoids N+1 and data leakage.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        first_name:
          type: string
          nullable: true
          maxLength: 150
        last_name:
          type: string
          nullable: true
          maxLength: 150
        username:
          type: string
          nullable: true
          maxLength: 150
        profile_picture:
          type: string
          format: uri
          readOnly: true
      required:
      - id
      - profile_picture
    AuthorBasicRequest:
      type: object
      description: Lightweight user embedding — avoids N+1 and data leakage.
      properties:
        first_name:
          type: string
          nullable: true
          maxLength: 150
        last_name:
          type: string
          nullable: true
          maxLength: 150
        username:
          type: string
          nullable: true
          maxLength: 150
    BlockUserResponse:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    BlogCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 120
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
    BlogCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          maxLength: 120
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - name
    BlogComment:
      type: object
      description: Serializer for blog comments, handling nested replies carefully.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        blog:
          type: string
          format: uuid
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/AuthorBasic'
          readOnly: true
        parent_comment:
          type: string
          format: uuid
          nullable: true
        comment_text:
          type: string
          description: Comment body text
        media_file:
          type: string
          format: uri
          nullable: true
        reply_count:
          type: integer
          readOnly: true
        is_edited:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        replies:
          type: string
          readOnly: true
      required:
      - blog
      - comment_text
      - created_at
      - id
      - is_edited
      - replies
      - reply_count
      - updated_at
      - user
    BlogCommentCreateRequest:
      type: object
      properties:
        comment_text:
          type: string
          minLength: 1
        parent_id:
          type: string
          format: uuid
        media_file:
          type: string
          format: binary
      required:
      - comment_text
    BlogDetail:
      type: object
      description: Full detail serializer with SEO and tags.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        content_body:
          type: string
          description: Markdown or HTML content
        cover_image:
          type: string
          format: uri
          nullable: true
        author:
          allOf:
          - $ref: '#/components/schemas/AuthorBasic'
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/BlogCategory'
          readOnly: true
        meta_title:
          type: string
          nullable: true
          maxLength: 100
        meta_description:
          type: string
          nullable: true
          maxLength: 255
        tags:
          description: List of string tags for simple searching
        is_published:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
        views_count:
          type: integer
          readOnly: true
        likes_count:
          type: integer
          readOnly: true
        comments_count:
          type: integer
          readOnly: true
        shares_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_liked:
          type: string
          readOnly: true
      required:
      - author
      - category
      - comments_count
      - content_body
      - created_at
      - id
      - is_liked
      - likes_count
      - shares_count
      - slug
      - title
      - updated_at
      - views_count
    BlogDetailRequest:
      type: object
      description: Full detail serializer with SEO and tags.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        content_body:
          type: string
          minLength: 1
