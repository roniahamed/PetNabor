        detail:
          type: string
      required:
      - detail
    BulkDeleteMessagesRequest:
      type: object
      description: Input for bulk message deletion.
      properties:
        message_ids:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 100
          minItems: 1
      required:
      - message_ids
    BulkDeleteResponse:
      type: object
      properties:
        success:
          type: boolean
        deleted_count:
          type: integer
      required:
      - deleted_count
      - success
    ChatThread:
      type: object
      description: |-
        Simplified thread serializer.

        DIRECT thread → `other_user` shows the other person (not the requester).
        GROUP  thread → `members` shows a simplified participant list.

        Requires `request` in serializer context to determine current user.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        thread_type:
          $ref: '#/components/schemas/ThreadTypeEnum'
        name:
          type: string
          nullable: true
          maxLength: 255
        avatar_url:
          type: string
          format: uri
          nullable: true
          maxLength: 512
        other_user:
          type: string
          readOnly: true
        members:
          type: string
          readOnly: true
        last_message_text:
          type: string
          nullable: true
          maxLength: 255
        last_message_timestamp:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - members
      - other_user
    ClearHistoryResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
      - message
      - success
    ConfirmPasswordResetRequest:
      type: object
      description: Validates password reset confirmation.
      properties:
        email_or_phone:
          type: string
          minLength: 1
        otp_code:
          type: string
          minLength: 4
          maxLength: 6
        new_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - email_or_phone
      - new_password
      - otp_code
    ConfirmPasswordResetResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
      - message
      - success
    CreateDirectThreadRequest:
      type: object
      description: Input serializer for starting a DIRECT chat.
      properties:
        recipient_id:
          type: string
          format: uuid
      required:
      - recipient_id
    CreateGroupThreadRequest:
      type: object
