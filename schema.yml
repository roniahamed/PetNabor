    StoryDetail:
      type: object
      description: |-
        Single-story detail view — adds reaction and reply counts.
        Counts are computed from the DB (only used on retrieve, not feed lists).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        author:
          allOf:
          - $ref: '#/components/schemas/StoryAuthor'
