          $ref: '#/components/schemas/PrivacyA01Enum'
        views_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        is_viewed:
          type: boolean
          description: |-
            Uses the `has_unseen` annotation (added by _annotate_story_queryset)
