# Host machine Nginx vhost for backend.petnabor.com
# Place this file in /etc/nginx/sites-available/backend.petnabor.com
# Then symlink it to /etc/nginx/sites-enabled/

upstream petnabor_backend {
    server 127.0.0.1:8002;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name backend.petnabor.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name backend.petnabor.com;

    ssl_certificate /etc/letsencrypt/live/backend.petnabor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.petnabor.com/privkey.pem;

    # Recommended TLS settings can stay in a shared include file if you have one.
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 5000M;

    location / {
        proxy_pass http://petnabor_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
