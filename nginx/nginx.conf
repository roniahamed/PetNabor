map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_forwarded_proto $origin_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

server {
    listen 80;
    server_name backend.petnabor.com 172.252.13.85;

    # Resolve Docker service name at runtime to avoid stale upstream IPs.
    resolver 127.0.0.11 valid=10s;
    set $web_upstream http://web:8000;

    # Allow large file uploads (up to 5GB)
    client_max_body_size 5000M;

    # Increase timeouts for large file transfers
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;

    # Disable buffering to stream large files directly
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_max_temp_file_size 0;

    location /ws/ {
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass $web_upstream;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_proto;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}
